<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Cover Letter Generator</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Header -->
    <header class="header">
        <h1>AI Cover Letter Generator</h1>
        <p>Create professional, ATS-friendly cover letters in seconds.</p>
    </header>

    <!-- Main -->
    <main class="main-grid">

        <!-- Left Panel -->
        <section class="form-section">

            <h2>Candidate Details</h2>

            <form id="coverLetterForm">

                <!-- Name -->
                <div class="input-group">
                    <label for="name">Candidate Name</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <!-- Job Role -->
                <div class="input-group">
                    <label for="role">Job Role</label>
                    <input
                        type="text"
                        id="role"
                        placeholder="Frontend Developer"
                        required
                    >
                </div>

                <!-- Company -->
                <div class="input-group">
                    <label for="company">Target Company</label>
                    <input
                        type="text"
                        id="company"
                        placeholder="Google"
                        required
                    >
                </div>

                <!-- Skills -->
                <div class="input-group">
                    <label for="skills">Key Skills</label>

                    <textarea
                        id="skills"
                        rows="5"
                        placeholder="HTML, CSS, JavaScript, React, Git..."
                        required
                    ></textarea>
                </div>

                <!-- Resume Upload -->
                <div class="input-group">
                    <label for="resume">
                        Upload Resume (PDF)
                    </label>

                    <input
                        type="file"
                        id="resume"
                        accept=".pdf"
                    >

                    <small id="fileName">
                        No file selected
                    </small>
                </div>

                <!-- Buttons -->
                <div class="button-group">

                    <button
                        type="submit"
                        id="generateBtn"
                    >
                        Generate Cover Letter
                    </button>

                    <button
                        type="reset"
                        id="clearBtn"
                    >
                        Clear
                    </button>

                </div>

            </form>

        </section>

        <!-- Right Panel -->
        <section class="output-section">

            <div class="output-header">

                <h2>Generated Cover Letter</h2>

                <button id="copyBtn">
                    Copy
                </button>

            </div>

            <!-- Loading -->
            <div
                id="loading"
                class="loading hidden"
            >
                Generating...
            </div>

            <!-- Output -->
            <div
                id="output"
                class="output-box"
            >

                <p class="placeholder">

                    Your AI-generated cover letter will appear here.

                </p>

            </div>
<div class="output-header">
    <h2>Generated Cover Letter</h2>

    <div class="action-buttons">

        <button id="downloadPdfBtn">📄 Download PDF</button>

    </div>
</div>
        </section>

    </main>

</div> 
<!-- JavaScript -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
